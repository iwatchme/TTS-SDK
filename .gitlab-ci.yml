image: cimg/android:2024.01

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

stages:
  - test
  - publish

.gradle_cache:
  cache:
    key: gradle-${CI_COMMIT_REF_SLUG}
    paths:
      - .gradle/
      - build/
      - "*/build/"
    policy: pull-push

test:
  stage: test
  extends: .gradle_cache
  script:
    - chmod +x gradlew
    - ./gradlew test
  artifacts:
    when: always
    reports:
      junit:
        - "*/build/test-results/test/*.xml"

publish:
  stage: publish
  extends: .gradle_cache
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - chmod +x gradlew
    - ./gradlew publish
  variables:
    VERSION: ${CI_COMMIT_TAG#v}
